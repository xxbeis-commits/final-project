<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xxbeis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #667eea;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .student-id {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .bio {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: left;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .skill-tag {
            background: #667eea;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="个人照片" class="profile-img">
        <h1>xxbeis</h1>
        <p class="student-id">学号：20242163</p>
        
        <div class="bio">
            <p>👋 大家好，我是来自北方民族大学软件工程专业的学生。</p>
            <br>
            <p>🎓 目前就读于大二，对软件开发和运维技术很感兴趣。</p>
            <br>
            <p>💻 擅长的技术包括：前端开发、Python、Docker、Linux 等。</p>
            <br>
            <p>🚀 未来希望成为一名全栈工程师或 DevOps 工程师。</p>
        </div>

        <div class="skills">
            <span class="skill-tag">HTML/CSS</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">Docker</span>
            <span class="skill-tag">Linux</span>
            <span class="skill-tag">Git</span>
        </div>

        <div class="footer">
            Final Project - Basic Development and Operation
        </div>
    </div>
</body>
</html>
